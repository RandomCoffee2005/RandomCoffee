repos:
  - repo: local
    hooks:
      - name: flake8
        id: flake8
        entry: flake8 --config=randomcoffee/.flake8
        language: unsupported
        types: [python]
      - name: bandit
        id: bandit
        entry: bandit --severity-level high
        language: unsupported
        types: [python]
        files: "^randomcoffee/src/"
